<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYON</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: #EDEDED;
  font-family: 'Caveat', cursive;
}

/* 星空 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.12;
}

/* 地球 */
.earth {
  position: absolute;
  bottom: -180px;
  left: 50%;
  transform: translateX(-50%);
  width: 520px;
  opacity: 0;
  animation: earthRise 6s ease forwards;
}

/* 標題 */
.title {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 3s;
  transition: opacity 1.5s ease;
}

/* 文字區 */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 600px;
  text-align: center;
  opacity: 0;
}

/* 每一行 */
.line {
  opacity: 0;
  margin: 10px 0;
  font-size: 26px;
}

/* 一句一句出 */
.show .line:nth-child(1){animation: fadeUp 0.8s forwards 0s;}
.show .line:nth-child(2){animation: fadeUp 0.8s forwards 1s;}
.show .line:nth-child(3){animation: fadeUp 0.8s forwards 2s;}
.show .line:nth-child(4){animation: fadeUp 0.8s forwards 3s;}
.show .line:nth-child(5){animation: fadeUp 0.8s forwards 4s;}
.show .line:nth-child(6){animation: fadeUp 0.8s forwards 5s;}
.show .line:nth-child(7){animation: fadeUp 0.8s forwards 6s;}
.show .line:nth-child(8){animation: fadeUp 0.8s forwards 7s;}

@keyframes earthRise {
  0% { bottom: -250px; opacity: 0; }
  100% { bottom: -180px; opacity: 0.5; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 簽名 */
.sign {
  position: absolute;
  bottom: 70px;
  right: 60px;
  width: 150px;
  opacity: 0;
  transition: opacity 2s ease;
}

/* 📱 手機 */
@media (max-width: 600px) {

  .earth {
    width: 320px;
    bottom: -120px;
  }

  .title {
    font-size: 24px;
    top: 42%;
  }

  .text {
    width: 85%;
    top: 48%;
  }

  .line {
    font-size: 18px;
    margin: 8px 0;
  }

  .sign {
    width: 90px;
    bottom: 40px;
    right: 30px;
  }

}
</style>
</head>

<body>

<div class="stars"></div>

<img src="https://pngimg.com/uploads/earth/earth_PNG39.png" class="earth">

<div class="title" id="title">不完美的快樂</div>

<div class="text" id="text">
  <div class="line">Hi, 我是 KAYON</div>
  <div class="line">如果你看到這裡</div>
  <div class="line">這張限量 NFC 專輯應該在你手上</div>
  <div class="line">謝謝你把它留下</div>
  <div class="line">當這個世界對你不太溫柔的時候</div>
  <div class="line">希望這張專輯</div>
  <div class="line">可以剛好陪著你</div>
  <div class="line">KAYON</div>
</div>

<img src="signature.png" class="sign" id="sign">

<script>
// 🎯 修正：title 先淡出 → 再消失 → 再進文字
setTimeout(() => {

  const title = document.getElementById('title');

  // 淡出
  title.style.opacity = '0';

  // 等動畫結束再移除
  setTimeout(() => {
    title.style.display = 'none';

    const text = document.getElementById('text');
    text.style.opacity = '1';
    text.classList.add('show');

  }, 1500);

}, 9000);


// 🎯 簽名最後出
setTimeout(() => {
  document.getElementById('sign').style.opacity = '1';
}, 18000);

</script>

</body>
</html>
