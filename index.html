<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYON</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: #EDEDED;
  font-family: 'Caveat', cursive;
}

/* 星空 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.12;
}

/* 地球 */
.earth {
  position: absolute;
  bottom: -180px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  opacity: 0;
  animation: earthRise 6s ease forwards;
}

/* 標題 */
.title {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 3s;
  transition: opacity 2s ease;
}

.title-zh {
  font-family: 'Caveat', cursive;
  font-size: 32px;
  white-space: nowrap;
  color: #EDEDED;
}

.title-zh .gap {
  display: inline-block;
  width: 2.4em;
}

.title-en {
  margin-top: 16px;
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  font-weight: 300;
  text-transform: lowercase;
  letter-spacing: 0.42em;
  color: #B8B8B8;
  padding-left: 0.42em; /* 補償字距造成的右側偏移，讓文字視覺置中 */
  opacity: 0.9;
}

/* 專輯 */
.album {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  opacity: 0;
  transition: opacity 2s ease;
}

/* 文字 */
.text {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  text-align: center;
  opacity: 0;
}

.line {
  opacity: 0;
  margin: 8px 0;
  font-size: 22px;
}

.show .line:nth-child(1){animation: fadeUp 0.8s forwards 0s;}
.show .line:nth-child(2){animation: fadeUp 0.8s forwards 1s;}
.show .line:nth-child(3){animation: fadeUp 0.8s forwards 2s;}
.show .line:nth-child(4){animation: fadeUp 0.8s forwards 3s;}
.show .line:nth-child(5){animation: fadeUp 0.8s forwards 4s;}
.show .line:nth-child(6){animation: fadeUp 0.8s forwards 5s;}
.show .line:nth-child(7){animation: fadeUp 0.8s forwards 6s;}

@keyframes earthRise {
  0% { bottom: -240px; opacity: 0; }
  100% { bottom: -180px; opacity: 0.4; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 簽名 */
.sign {
  display: block;
  margin: 30px auto 0;
  width: 220px;
  opacity: 0;
  transition: opacity 2s ease;
  filter: brightness(1.2);
}

/* ===== 串流頁 ===== */

.page2 {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
  z-index: 999;

  font-family: 'Inter', sans-serif;

  overflow-y: auto;
  padding: 40px 0;
  box-sizing: border-box;
  -webkit-overflow-scrolling: touch;
}

.page2.show {
  overflow-y: auto;
}

.page2.show {
  opacity: 1;
  pointer-events: auto;
}

/* 頂部 KAYON STUDIO logo */
.studio-logo {
  width: 110px;
  opacity: 0.85;
  margin-bottom: 28px;
}

.cover {
  width: 160px;
  margin-bottom: 24px;
}

/* 引導文字 */
.page2-intro {
  font-size: 14px;
  color: #CFCFCF;
  letter-spacing: 1px;
  margin: 0 0 28px;
  text-align: center;
}

/* ICON區 */
.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.buttons img {
  width: 40px;
  height: 40px;
  object-fit: contain;

  opacity: 0.9;
  transition: all 0.25s ease;
}

.buttons img:hover {
  transform: scale(1.12);
  opacity: 1;
}

/* 結尾文字 */
.page2-outro {
  margin-top: 40px;
  text-align: center;
  color: #BDBDBD;
  font-size: 13px;
  line-height: 1.8;
  letter-spacing: 0.5px;
  padding: 0 20px;
}

.page2-outro .wish {
  color: #EDEDED;
  font-size: 14px;
  margin-bottom: 18px;
}

.page2-outro .follow {
  margin-bottom: 6px;
  opacity: 0.85;
}

.page2-outro .socials a {
  color: #EDEDED;
  text-decoration: none;
  opacity: 0.9;
  transition: opacity 0.2s ease;
}

.page2-outro .socials a:hover {
  opacity: 1;
  text-decoration: underline;
}

.page2-outro .socials .sep {
  margin: 0 10px;
  opacity: 0.5;
}

/* 底部版權區 */
.footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 80%;
  max-width: 420px;
}

.footer-logo {
  width: 140px;
  opacity: 0.7;
  margin-bottom: 14px;
}

.footer-copy {
  text-align: center;
  color: #888;
  font-size: 11px;
  line-height: 1.7;
  letter-spacing: 0.5px;
  margin: 0;
}

.footer-copy .produced {
  opacity: 0.75;
  font-size: 10.5px;
  margin-top: 4px;
}

/* 手機 */
@media (max-width:600px){

  .earth {
    width: 240px;
    bottom: -160px;
  }

  .title-zh {
    font-size: 22px;
  }

  .title-zh .gap {
    width: 1.8em;
  }

  .title-en {
    font-size: 9px;
    letter-spacing: 0.38em;
    margin-top: 12px;
  }

  .album {
    width: 140px;
    top: 55%;
  }

  .text {
    width: 85%;
    top: 40%;
  }

  .line {
    font-size: 18px;
  }

  .sign {
    width: 180px;
  }

  .buttons img {
    width: 34px;
    height: 34px;
  }

  .page2-intro {
    font-size: 13px;
  }

  .page2-outro {
    font-size: 12px;
    margin-top: 32px;
  }

  .page2-outro .wish {
    font-size: 13px;
  }

  .studio-logo {
    width: 90px;
    margin-bottom: 22px;
  }

  .footer {
    margin-top: 36px;
    padding-top: 20px;
    width: 85%;
  }

  .footer-logo {
    width: 120px;
  }

  .footer-copy {
    font-size: 10px;
  }

  .footer-copy .produced {
    font-size: 9.5px;
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<img src="https://pngimg.com/uploads/earth/earth_PNG39.png" class="earth">

<div class="title" id="title">
  <div class="title-zh">不<span class="gap"></span>完美的快樂</div>
  <div class="title-en">imperfect happiness</div>
</div>

<img src="album.png" class="album" id="album">

<div class="text" id="text">
  <div class="line">Hi, 我是 KAYON</div>
  <div class="line">如果你看到這裡</div>
  <div class="line">這張限量 NFC 專輯應該在你手上</div>
  <div class="line">謝謝你把它留下</div>
  <div class="line">當這個世界對你不太溫柔的時候</div>
  <div class="line">希望這張專輯</div>
  <div class="line">可以剛好陪著你</div>

  <img src="signature.png" class="sign" id="sign">
</div>

<!-- 串流頁 -->
<div class="page2" id="page2">

  <img src="kayon-studio-logo.png" class="studio-logo" alt="KAYON STUDIO">

  <img src="album.png" class="cover">

  <p class="page2-intro">接下來選擇你常用的平台即可收聽</p>

  <div class="buttons">

    <a href="https://is.gd/ec6R3Q" target="_blank">
      <img src="apple music.png">
    </a>

    <a href="https://open.spotify.com/album/4rxVJhUSasV4dtwMVBsQ3H?si=dJkUIPAyTrWoja6PSplASA" target="_blank">
      <img src="spotify.png">
    </a>

    <a href="https://music.youtube.com/playlist?list=OLAK5uy_mjhgI-rnwovVQD-68s8KzRZHCsU5YpNvQ" target="_blank">
      <img src="youtube music.png">
    </a>

    <a href="https://www.kkbox.com/tw/tc/album/DXKBzcIPYpMkg8zIUr" target="_blank">
      <img src="kkbox.png">
    </a>

    <a href="https://music-tw.line.me/album/7941443" target="_blank">
      <img src="line.png">
    </a>

  </div>

  <div class="page2-outro">
    <p class="wish">希望接下來會有《完美的快樂》陪著你</p>
    <p class="follow">更多 KAYON 的消息請關注官方</p>
    <p class="socials">
      <a href="https://www.instagram.com/kayonstudio_official/" target="_blank">Instagram</a>
      <span class="sep">|</span>
      <a href="https://www.youtube.com/@KARBONXGAIA_ENT" target="_blank">YouTube</a>
    </p>
  </div>

  <div class="footer">
    <img src="karbonxgaia-logo.png" class="footer-logo" alt="KARBØN X GAIA ENTERTAINMENT">
    <p class="footer-copy">
      ℗ &amp; © 2026 KARBØN X GAIA ENTERTAINMENT. All Rights Reserved.
      <span class="produced" style="display:block;">Produced by KAYON STUDIO.</span>
    </p>
  </div>

</div>

<script>

// 第一頁（不動）
setTimeout(() => {
  document.getElementById('title').style.opacity = '0';
  setTimeout(()=>{
    document.getElementById('title').style.display = 'none';
    document.getElementById('album').style.opacity = '1';
  },2000);
}, 9000);

setTimeout(() => {
  document.getElementById('album').style.opacity = '0';
  const text = document.getElementById('text');
  text.style.opacity = '1';
  text.classList.add('show');
}, 13000);

setTimeout(() => {
  document.getElementById('sign').style.opacity = '1';
}, 20000);

// 串流頁
setTimeout(() => {
  document.getElementById('page2').classList.add('show');
}, 24000);

</script>

</body>
</html>
