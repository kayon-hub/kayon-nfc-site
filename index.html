<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYON</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: #EDEDED;
  font-family: 'Caveat', cursive;
}

/* 星空 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.12;
}

/* 地球 */
.earth {
  position: absolute;
  bottom: -180px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  opacity: 0;
  animation: earthRise 6s ease forwards;
}

/* 標題 */
.title {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 3s;
  transition: opacity 2s ease;
}

/* 專輯 */
.album {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  opacity: 0;
  transition: opacity 2s ease;
}

/* 文字 */
.text {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  text-align: center;
  opacity: 0;
}

.line {
  opacity: 0;
  margin: 8px 0;
  font-size: 22px;
}

.show .line:nth-child(1){animation: fadeUp 0.8s forwards 0s;}
.show .line:nth-child(2){animation: fadeUp 0.8s forwards 1s;}
.show .line:nth-child(3){animation: fadeUp 0.8s forwards 2s;}
.show .line:nth-child(4){animation: fadeUp 0.8s forwards 3s;}
.show .line:nth-child(5){animation: fadeUp 0.8s forwards 4s;}
.show .line:nth-child(6){animation: fadeUp 0.8s forwards 5s;}
.show .line:nth-child(7){animation: fadeUp 0.8s forwards 6s;}

@keyframes earthRise {
  0% { bottom: -240px; opacity: 0; }
  100% { bottom: -180px; opacity: 0.4; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 簽名 */
.sign {
  display: block;
  margin: 30px auto 0;
  width: 220px;
  opacity: 0;
  transition: opacity 2s ease;
  filter: brightness(1.2);
}

/* ===== 串流頁 ===== */

.page2 {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
  z-index: 999;

  font-family: 'Inter', sans-serif;
}

.page2.show {
  opacity: 1;
  pointer-events: auto;
}

.cover {
  width: 160px;
  margin-bottom: 40px;
}

/* ICON區 */
.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.buttons img {
  width: 40px;
  height: 40px;
  object-fit: contain;

  opacity: 0.9;
  transition: all 0.25s ease;
}

.buttons img:hover {
  transform: scale(1.12);
  opacity: 1;
}

/* 手機 */
@media (max-width:600px){

  .earth {
    width: 240px;
    bottom: -160px;
  }

  .title {
    font-size: 22px;
  }

  .album {
    width: 140px;
    top: 55%;
  }

  .text {
    width: 85%;
    top: 40%;
  }

  .line {
    font-size: 18px;
  }

  .sign {
    width: 180px;
  }

  .buttons img {
    width: 34px;
    height: 34px;
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<img src="https://pngimg.com/uploads/earth/earth_PNG39.png" class="earth">

<div class="title" id="title">不完美的快樂</div>

<img src="album.png" class="album" id="album">

<div class="text" id="text">
  <div class="line">Hi, 我是 KAYON</div>
  <div class="line">如果你看到這裡</div>
  <div class="line">這張限量 NFC 專輯應該在你手上</div>
  <div class="line">謝謝你把它留下</div>
  <div class="line">當這個世界對你不太溫柔的時候</div>
  <div class="line">希望這張專輯</div>
  <div class="line">可以剛好陪著你</div>

  <img src="signature.png" class="sign" id="sign">
</div>

<!-- 串流頁 -->
<div class="page2" id="page2">

  <img src="album.png" class="cover">

  <div class="buttons">

    <a href="https://is.gd/ec6R3Q" target="_blank">
      <img src="apple music.png">
    </a>

    <a href="https://open.spotify.com/album/4rxVJhUSasV4dtwMVBsQ3H?si=dJkUIPAyTrWoja6PSplASA" target="_blank">
      <img src="spotify.png">
    </a>

    <a href="https://music.youtube.com/playlist?list=OLAK5uy_mjhgI-rnwovVQD-68s8KzRZHCsU5YpNvQ" target="_blank">
      <img src="youtube music.png">
    </a>

    <a href="https://www.kkbox.com/tw/tc/album/DXKBzcIPYpMkg8zIUr" target="_blank">
      <img src="kkbox.png">
    </a>

    <a href="https://music-tw.line.me/album/7941443" target="_blank">
      <img src="line.png">
    </a>

  </div>

</div>

<script>

// 第一頁（不動）
setTimeout(() => {
  document.getElementById('title').style.opacity = '0';
  setTimeout(()=>{
    document.getElementById('title').style.display = 'none';
    document.getElementById('album').style.opacity = '1';
  },2000);
}, 9000);

setTimeout(() => {
  document.getElementById('album').style.opacity = '0';
  const text = document.getElementById('text');
  text.style.opacity = '1';
  text.classList.add('show');
}, 13000);

setTimeout(() => {
  document.getElementById('sign').style.opacity = '1';
}, 20000);

// 串流頁
setTimeout(() => {
  document.getElementById('page2').classList.add('show');
}, 24000);

</script>

</body>
</html>
