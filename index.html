<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYON</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: #EDEDED;
  font-family: 'Caveat', cursive;
}

/* 星空 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.12;
}

/* 🌍 地球（穩定版） */
.earth {
  position: absolute;
  bottom: -180px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  opacity: 0;
  animation: earthRise 6s ease forwards;
}

/* 標題 */
.title {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 3s;
  transition: opacity 2s ease;
}

/* 專輯 */
.album {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  opacity: 0;
  transition: opacity 2s ease;
}

/* ✍️ 文字 */
.text {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  text-align: center;
  opacity: 0;
}

.line {
  opacity: 0;
  margin: 8px 0;
  font-size: 22px;
}

/* 一句一句動畫 */
.show .line:nth-child(1){animation: fadeUp 0.8s forwards 0s;}
.show .line:nth-child(2){animation: fadeUp 0.8s forwards 1s;}
.show .line:nth-child(3){animation: fadeUp 0.8s forwards 2s;}
.show .line:nth-child(4){animation: fadeUp 0.8s forwards 3s;}
.show .line:nth-child(5){animation: fadeUp 0.8s forwards 4s;}
.show .line:nth-child(6){animation: fadeUp 0.8s forwards 5s;}
.show .line:nth-child(7){animation: fadeUp 0.8s forwards 6s;}

@keyframes earthRise {
  0% { bottom: -240px; opacity: 0; }
  100% { bottom: -180px; opacity: 0.4; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ✍️ 簽名（關鍵修正：放進內容流） */
.sign {
  display: block;
  margin: 30px auto 0;
  width: 220px;
  opacity: 0;
  transition: opacity 2s ease;
  filter: brightness(1.2);
}

/* 📱 手機 */
@media (max-width:600px){

  .earth {
    width: 240px;
    bottom: -160px;
  }

  .title {
    font-size: 22px;
  }

  .album {
    width: 140px;
    top: 55%;
  }

  .text {
    width: 85%;
    top: 40%;
  }

  .line {
    font-size: 18px;
  }

  .sign {
    width: 180px;
    margin-top: 24px;
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<img src="https://pngimg.com/uploads/earth/earth_PNG39.png" class="earth">

<div class="title" id="title">不完美的快樂</div>

<img src="album.png" class="album" id="album">

<div class="text" id="text">
  <div class="line">Hi, 我是 KAYON</div>
  <div class="line">如果你看到這裡</div>
  <div class="line">這張限量 NFC 專輯應該在你手上</div>
  <div class="line">謝謝你把它留下</div>
  <div class="line">當這個世界對你不太溫柔的時候</div>
  <div class="line">希望這張專輯</div>
  <div class="line">可以剛好陪著你</div>

  <!-- ✅ 簽名在這裡 -->
  <img src="signature.png" class="sign" id="sign">
</div>

<script>

// 標題 → 專輯
setTimeout(() => {
  const title = document.getElementById('title');
  title.style.opacity = '0';

  setTimeout(()=>{
    title.style.display = 'none';
    document.getElementById('album').style.opacity = '1';
  },2000);

}, 9000);

// 專輯 → 文字
setTimeout(() => {
  document.getElementById('album').style.opacity = '0';

  const text = document.getElementById('text');
  text.style.opacity = '1';
  text.classList.add('show');

}, 13000);

// 簽名出現
setTimeout(() => {
  document.getElementById('sign').style.opacity = '1';
}, 20000);

</script>

</body>
</html>
