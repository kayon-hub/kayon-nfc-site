<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>KAYON</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: #EDEDED;
  font-family: 'Caveat', cursive;
}

/* 星空（極淡） */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.15;
}

/* 地球 */
.earth {
  position: absolute;
  bottom: -300px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  opacity: 0;
  animation: earthRise 6s ease forwards;
}

/* 標題 */
.title {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 34px;
  letter-spacing: 3px;
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 4s;
}

/* 文字區 */
.text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 600px;
  text-align: center;
  opacity: 0;
  transition: opacity 2s ease;
}

.line {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 0.8s ease forwards;
  margin: 10px 0;
  font-size: 26px;
}

/* 每行延遲（節奏） */
.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:2s;}
.line:nth-child(3){animation-delay:3s;}
.line:nth-child(4){animation-delay:4s;}
.line:nth-child(5){animation-delay:5s;}
.line:nth-child(6){animation-delay:6s;}
.line:nth-child(7){animation-delay:7s;}
.line:nth-child(8){animation-delay:8s;}

@keyframes earthRise {
  0% {
    bottom: -300px;
    opacity: 0;
  }
  100% {
    bottom: -120px;
    opacity: 0.6;
  }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 簽名 */
.sign {
  position: absolute;
  bottom: 60px;
  right: 60px;
  width: 160px;

  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 18s; /* 最後出場 */
}

@media (max-width:600px){
  .earth{width:450px;}
  .line{font-size:22px;}
  .sign{width:120px;}
}
</style>
</head>

<body>

<div class="stars"></div>

<img src="https://pngimg.com/uploads/earth/earth_PNG39.png" class="earth">

<div class="title" id="title">不完美的快樂</div>

<div class="text" id="text">
  <div class="line">Hi, 我是 KAYON</div>
  <div class="line">如果你看到這裡</div>
  <div class="line">這張限量 NFC 專輯應該在你手上</div>
  <div class="line">謝謝你把它留下</div>
  <div class="line">當這個世界對你不太溫柔的時候</div>
  <div class="line">希望這張專輯</div>
  <div class="line">可以剛好陪著你</div>
  <div class="line">KAYON</div>
</div>

<img src="signature.png" class="sign">

<script>
setTimeout(() => {
  document.getElementById('title').style.opacity = '0';

  setTimeout(() => {
    document.getElementById('text').style.opacity = '1';
  }, 1500);

}, 9000);
</script>

</body>
</html>
